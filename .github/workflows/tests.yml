name: Testes Automáticos

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  testar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: Instalar dependências
        run: composer install || true

      - name: Rodar testes
        run: echo "Sem testes ainda"
